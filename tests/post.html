<extends src="base.html">
  <block name="content">
    <article>
      <h2>{{ post.title }}</h2>
      <div class="meta">
        <time>{{ post.date | formatDate }}</time>
        <if condition="post.tags">
          <div class="tags">
            <for each="tag in post.tags">
              <span class="tag">{{ tag }}</span>
            </for>
          </div>
        </if>
      </div>
      <div class="content">{{ post.content | markdown }}</div>
    </article>
  </block>
</extends>
