<!DOCTYPE html>
<html>
<body>
    <h1>Array Access Test</h1>

    <!-- Test array access -->
    <div>First post title: {{posts[0].title}}</div>
    <div>First post author: {{posts[0].author}}</div>
    <div>Second post title: {{posts[1].title}}</div>

    <!-- Test nested access -->
    <div>First tag of first post: {{posts[0].tags[0]}}</div>
    <div>Second tag of first post: {{posts[0].tags[1]}}</div>
</body>
</html>
