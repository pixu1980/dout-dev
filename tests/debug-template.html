<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debug Loop Test</title>
  </head>
  <body>
    <h1>Debug Test</h1>

    <!-- Test 1: Simple list of posts -->
    <h2>Test 1: Posts Only</h2>
    <ul>
      <for each="post in posts">
        <li>{{post.title}} by {{post.author}}</li>
      </for>
    </ul>

    <!-- Test 2: Single post with tags -->
    <h2>Test 2: First Post Tags</h2>
    <div>
      <strong>{{posts[0].title}}</strong>
      <div class="tags">
        <for each="tag in posts[0].tags">
          <span class="tag">{{tag}}</span>
        </for>
      </div>
    </div>

    <!-- Test 3: Nested loops -->
    <h2>Test 3: Nested Loops</h2>
    <ol>
      <for each="post in posts">
        <li>
          <strong>{{post.title}}</strong>
          <br />
          <small>by {{post.author}}</small>
          <div class="tags">
            <for each="tag in post.tags">
              <span class="tag">{{tag}}</span>
            </for>
          </div>
        </li>
      </for>
    </ol>
  </body>
</html>
