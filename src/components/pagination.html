<if condition="pagination">
  <nav class="pagination" aria-label="Pagination">
    <if condition="pagination.prevHref"><a rel="prev" href="{{ pagination.prevHref }}">Prev</a></if>
    <ul>
      <for each="pg in pagination.pages">
        <li>
          <if condition="pg.gap">…</if>
          <if condition="!pg.gap">
            <if condition="pg.current">
              <a href="{{ pg.href }}" aria-current="page">{{ pg.page }}</a>
            </if>
            <if condition="!pg.current">
              <a href="{{ pg.href }}">{{ pg.page }}</a>
            </if>
          </if>
        </li>
      </for>
    </ul>
    <if condition="pagination.nextHref"><a rel="next" href="{{ pagination.nextHref }}">Next</a></if>
  </nav>
</if>
