<!--
  Post Card Component
  Usage: include('post-card', { post: postObject, variant: 'default'|'featured'|'compact' })
-->
<article
  class="post-card post-card--{{ variant | default:'default' }}"
  itemscope
  itemtype="https://schema.org/BlogPosting"
>
  <!-- Post header -->
  <header class="post-card-header">
    <h3 class="post-card-title" itemprop="headline">
      <a href="{{ post.url }}" class="post-card-link" itemprop="url"> {{ post.title }} </a>
    </h3>

    <!-- Post meta -->
    <div class="post-card-meta">
      <time class="post-card-date" datetime="{{ post.date | date:'iso' }}" itemprop="datePublished">
        {{ post.date | date:'long' }}
      </time>

      <if condition="post.author">
        <span class="post-card-author" itemprop="author" itemscope itemtype="https://schema.org/Person">
          by <span itemprop="name">{{ post.author }}</span>
        </span>
      </if>

      <if condition="post.readingTime">
        <span class="post-card-reading-time" aria-label="Estimated reading time">
          {{ post.readingTime }} min read
        </span>
      </if>
    </div>
  </header>

  <!-- Post excerpt -->
  <if condition="post.excerpt">
    <div class="post-card-content">
      <p class="post-card-excerpt" itemprop="description">{{ post.excerpt | truncate:150 }}</p>
    </div>
  </if>

  <!-- Post tags -->
  <if condition="post.tags and post.tags.length > 0">
    <footer class="post-card-footer">
      <div class="post-card-tags" role="group" aria-label="Post tags">
        <for each="tag in post.tags | slice:0,3">
          <a href="/tags/{{ tag | slugify }}/" class="post-card-tag" rel="tag" itemprop="keywords"> {{ tag }} </a>
        </for>
        <if condition="post.tags.length > 3">
          <span class="post-card-tag-more" aria-label="and {{ post.tags.length - 3 }} more tags">
            +{{ post.tags.length - 3 }}
          </span>
        </if>
      </div>
    </footer>
  </if>

  <!-- Featured badge -->
  <if condition="variant === 'featured'">
    <div class="post-card-badge" aria-label="Featured post">
      <span class="post-card-badge-text">Featured</span>
    </div>
  </if>

  <!-- Schema.org metadata -->
  <meta itemprop="dateModified" content="{{ post.modified | default:post.date | date:'iso' }}" />
  <if condition="post.image">
    <meta itemprop="image" content="{{ post.image }}" />
  </if>
</article>
