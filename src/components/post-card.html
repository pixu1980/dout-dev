<article class="post-card{{ showCover && post.coverImage ? ' post-card--with-media' : '' }}">
  <if condition="showCover && post.coverImage">
    <figure class="post-card__media">
      <a href="/posts/{{ post.name }}.html" tabindex="-1">
        <img
          src="{{ post.coverImage | absUrl }}"
          alt="{{ post.coverAlt || post.title }}"
          loading="lazy"
          decoding="async"
          width="{{ post.coverWidth || '' }}"
          height="{{ post.coverHeight || '' }}"
        />
      </a>
    </figure>
  </if>

  <div class="post-card__body">
    <header class="post-card__header">
      <p class="post-card__meta">
        <time datetime="{{ post.date | date:'YYYY-MM-DD' }}">{{ post.date | date:'long' }}</time>
      </p>

      <switch expr="headingLevel">
        <case value="3">
          <h3 class="post-card__title"><a href="/posts/{{ post.name }}.html">{{ post.title }}</a></h3>
        </case>
        <case value="4">
          <h4 class="post-card__title"><a href="/posts/{{ post.name }}.html">{{ post.title }}</a></h4>
        </case>
        <default>
          <h2 class="post-card__title"><a href="/posts/{{ post.name }}.html">{{ post.title }}</a></h2>
        </default>
      </switch>
    </header>

    <if condition="showExcerpt && post.excerpt">
      <p class="post-card__excerpt">{{ post.excerpt }}</p>
    </if>
  </div>

  <if condition="showTags && post.tags && post.tags.length">
    <footer class="post-card__footer">
      <ul class="post-card__tags" aria-label="Post topics">
        <for each="t in post.tags">
          <li><a class="tag tag--small" href="{{ t | tagHref }}">{{ t | tagLabel }}</a></li>
        </for>
      </ul>
    </footer>
  </if>
</article>
