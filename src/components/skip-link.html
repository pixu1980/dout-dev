<!--
  Skip Link Component
  Usage: include('skip-link', { target: '#main-content', text: 'Skip to main content' })
-->
<div class="skip-links" role="region" aria-label="Skip navigation">
  <a href="{{ target | default:'#main-content' }}" class="skip-link" id="skip-to-main">
    {{ text | default:'Skip to main content' }}
  </a>

  <if condition="showAdditional">
    <a href="#nav" class="skip-link">Skip to navigation</a>
    <a href="#footer" class="skip-link">Skip to footer</a>
  </if>
</div>

<style>
  .skip-links {
    position: relative;
    z-index: 1000;
  }

  .skip-link {
    position: absolute;
    top: -40px;
    left: 6px;
    background: var(--color-primary, #0066cc);
    color: var(--color-primary-contrast, #ffffff);
    padding: 8px 16px;
    text-decoration: none;
    border-radius: 0 0 4px 4px;
    font-weight: 500;
    font-size: 0.875rem;
    line-height: 1.2;
    transition: top 0.2s ease-in-out;
    z-index: 1001;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  .skip-link:focus {
    top: 6px;
    outline: 2px solid var(--color-focus, #ffbf47);
    outline-offset: 2px;
  }

  .skip-link:hover {
    background: var(--color-primary-hover, #0052a3);
  }

  /* High contrast mode support */
  @media (prefers-contrast: high) {
    .skip-link {
      background: #000000;
      color: #ffffff;
      border: 2px solid #ffffff;
    }

    .skip-link:focus {
      outline: 3px solid #ffff00;
      outline-offset: 2px;
    }
  }

  /* Reduced motion support */
  @media (prefers-reduced-motion: reduce) {
    .skip-link {
      transition: none;
    }
  }
</style>
