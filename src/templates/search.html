<extends src="../layouts/base.html">
  <block name="head">
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ title }}" />
    <meta property="og:description" content="{{ description }}" />
    <meta property="og:url" content="{{ canonicalUrl }}" />
    <meta property="og:image" content="{{ ogImageUrl }}" />
    <meta property="og:image:alt" content="Preview image for {{ title }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:title" content="{{ title }}" />
    <meta name="twitter:description" content="{{ description }}" />
    <meta name="twitter:image" content="{{ ogImageUrl }}" />
    <meta name="twitter:image:alt" content="Preview image for {{ title }}" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SearchResultsPage",
        "name": {{ title | json | raw }},
        "url": "{{ canonicalUrl }}",
        "description": {{ description | json | raw }}
      }
    </script>
  </block>
  <block name="content">
    <section data-page-hero data-reveal>
      <p data-eyebrow>Search</p>
      <h1>Search across posts, tags, series, and monthly archives.</h1>
      <p>Fast, static, and entirely client-side.</p>
    </section>

    <section data-search-shell aria-label="Search interface">
      <form
        id="search-form"
        role="search"
        aria-label="Site search"
        data-card
        data-search-form
        data-reveal
        action="/search.html"
        method="get"
      >
        <label for="q">Query</label>
        <input
          id="q"
          name="q"
          type="search"
          inputmode="search"
          autocomplete="off"
          autocapitalize="off"
          placeholder="Search posts, tags, and series..."
          value="{{ query | default:'' }}"
        />
        <button type="submit">Search</button>
        <div data-cluster role="group" aria-label="Filter by type">
          <label data-search-filter>
            <input type="checkbox" name="type" value="post" checked />
            <span>Posts</span>
          </label>
          <label data-search-filter>
            <input type="checkbox" name="type" value="tag" checked />
            <span>Tags</span>
          </label>
          <label data-search-filter>
            <input type="checkbox" name="type" value="series" checked />
            <span>Series</span>
          </label>
          <label data-search-filter>
            <input type="checkbox" name="type" value="month" checked />
            <span>Months</span>
          </label>
        </div>
      </form>

      <div data-search-toolbar data-reveal>
        <div
          data-cluster
          data-search-summary
          aria-live="polite"
          aria-atomic="true"
          id="results-summary"
          tabindex="-1"
        ></div>
      </div>

      <ul id="search-results" data-post-feed data-post-feed-variant="feature-list" aria-label="Search results"></ul>

      <nav id="search-pagination" data-pagination aria-label="Search results pagination"></nav>
    </section>
  </block>
</extends>
