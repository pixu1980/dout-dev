<extends src="../layouts/base.html" />

<block name="head">
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ title }}" />
  <meta property="og:description" content="{{ description }}" />
  <meta property="og:url" content="{{ canonicalUrl }}" />
  <meta property="og:image" content="{{ ogImageUrl }}" />
  <meta property="og:image:alt" content="Preview image for {{ title }}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:title" content="{{ title }}" />
  <meta name="twitter:description" content="{{ description }}" />
  <meta name="twitter:image" content="{{ ogImageUrl }}" />
  <meta name="twitter:image:alt" content="Preview image for {{ title }}" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": {{ title | json | raw }},
      "url": "{{ canonicalUrl }}",
      "description": {{ description | json | raw }}
    }
  </script>
</block>

<block name="content">
  <section data-page-hero>
    <p data-eyebrow>Archive</p>
    <h1>The complete dout.dev archive.</h1>
    <p>Browse everything by time, by topic, or by longer-running series.</p>
  </section>

  <section data-archive-bento aria-label="Archive navigation">
    <article data-archive-bento-panel data-archive-bento-months data-bento-accent="sky">
      <h2>Months</h2>
      <div data-archive-tag-group>
        <for each="month in months">
          <a data-archive-tag href="/months/{{ month.slug }}.html">
            <span data-archive-tag-label>{{ month.name }}</span>
            <span data-archive-tag-count>{{ month.count }}</span>
          </a>
        </for>
      </div>
    </article>

    <if condition="authors && authors.length">
      <article data-archive-bento-panel data-archive-bento-authors data-bento-accent="rose">
        <h2>Authors</h2>
        <div data-archive-tag-group>
          <for each="author in authors">
            <a data-archive-tag href="/authors/{{ author.slug }}.html">
              <span data-archive-tag-label>{{ author.name }}</span>
              <span data-archive-tag-count>{{ author.count }}</span>
            </a>
          </for>
        </div>
      </article>
    </if>

    <article data-archive-bento-panel data-archive-bento-series data-bento-accent="mint">
      <h2>Series</h2>
      <div data-archive-tag-group>
        <for each="entry in series">
          <a data-archive-tag href="/series/{{ entry.slug }}.html">
            <span data-archive-tag-label>{{ entry.title }}</span>
            <span data-archive-tag-count>{{ entry.count }}</span>
          </a>
        </for>
      </div>
    </article>

    <article data-archive-bento-panel data-archive-bento-topics>
      <h2>Topics</h2>
      <div data-tag-list>
        <for each="tag in tags">
          <a data-tag href="/tags/{{ tag.slug }}.html">
            {{ tag.name }}
            <span data-tag-count>{{ tag.count }}</span>
          </a>
        </for>
      </div>
    </article>
  </section>
</block>
