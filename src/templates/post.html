<extends src="../layouts/base.html" />

<block name="head">
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{ post.title }}" />
  <if condition="description"><meta property="og:description" content="{{ description }}" /></if>
  <if condition="post.coverImage"><meta property="og:image" content="{{ post.coverImage | absUrl }}" /></if>
  <script type="application/ld+json">
    {
        "@context":"https://schema.org",
        "@type":"BlogPosting",
        "headline": {{ post.title | json | raw }},
        "datePublished": "{{ post.date | date:'iso' }}",
        "mainEntityOfPage": {"@type":"WebPage","@id":"{{ canonicalUrl }}"}
      }
  </script>
</block>

<block name="content">
  <article itemscope itemtype="https://schema.org/BlogPosting">
    <header>
      <h1 itemprop="headline">{{ post.title }}</h1>
      <p>
        <time datetime="{{ post.date | date:'YYYY-MM-DD' }}" itemprop="datePublished">
          {{ post.date | date:'long' }}
        </time>
      </p>
      <if condition="post.coverImage">
        <figure class="post-cover">
          <img
            src="{{ post.coverImage | absUrl }}"
            alt="{{ post.coverAlt }}"
            fetchpriority="high"
            decoding="async"
            width="{{ post.coverWidth && post.coverHeight ? post.coverWidth : '' }}"
            height="{{ post.coverWidth && post.coverHeight ? post.coverHeight : '' }}"
          />
        </figure>
      </if>
      <if condition="post.tags && post.tags.length">
        <ul aria-label="Tags">
          <for each="t in post.tags">
            <li><a class="tag" href="{{ t | tagHref }}">{{ t | tagLabel }}</a></li>
          </for>
        </ul>
      </if>
    </header>

    <section itemprop="articleBody">{{ post.content | raw }}</section>

    <nav aria-label="Post navigation">
      <if condition="post.prev">
        <a rel="prev" href="{{ post.prev.url }}">← {{ post.prev.title }}</a>
      </if>
      <if condition="post.next">
        <a rel="next" href="{{ post.next.url }}">{{ post.next.title }} →</a>
      </if>
    </nav>
  </article>
</block>
