<extends src="../layouts/base.html" />

<block name="head">
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ title }}" />
  <meta property="og:description" content="{{ description }}" />
  <meta property="og:url" content="{{ canonicalUrl }}" />
  <meta property="og:image" content="{{ ogImageUrl }}" />
  <meta property="og:image:alt" content="Preview image for {{ title }}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:title" content="{{ title }}" />
  <meta name="twitter:description" content="{{ description }}" />
  <meta name="twitter:image" content="{{ ogImageUrl }}" />
  <meta name="twitter:image:alt" content="Preview image for {{ title }}" />
  <script type="application/ld+json">
    {
        "@context":"https://schema.org",
        "@type":"CollectionPage",
        "name": {{ title | json | raw }},
        "url":"{{ canonicalUrl }}",
        "description": {{ description | json | raw }},
        "isPartOf":{"@type":"Blog","name": {{ site.title | json | raw }},"url":"{{ site.url }}"}
      }
  </script>
  <script type="application/ld+json">
    {
        "@context":"https://schema.org",
        "@type":"BreadcrumbList",
        "itemListElement":[
          {"@type":"ListItem","position":1,"name":"Home","item":"{{ site.url }}"},
          {"@type":"ListItem","position":2,"name":"Archive","item":"{{ site.url }}/archive.html"},
          {"@type":"ListItem","position":3,"name": {{ series.title | json | raw }},"item":"{{ canonicalUrl }}"}
        ]
      }
  </script>
</block>

<block name="content">
  <section class="page-hero" aria-labelledby="series-title">
    <p class="eyebrow">Series</p>
    <h1 id="series-title">{{ series.title }}</h1>
    <if condition="series.description">
      <p>{{ series.description }}</p>
    </if>
  </section>

  <section class="post-feed-shell" aria-labelledby="series-posts-title">
    <div class="section-heading section-heading--feed">
      <div>
        <p class="eyebrow eyebrow--muted">Posts</p>
        <h2 id="series-posts-title">Posts in this series</h2>
      </div>
    </div>

    <ul
      data-post-feed
      data-post-feed-variant="feature-list"
      data-load-more-feed="{{ loadMore ? 'true' : '' }}"
      data-load-more-initial="{{ loadMore ? loadMore.initial : '' }}"
      data-load-more-step="{{ loadMore ? loadMore.step : '' }}"
      data-load-more-label="{{ loadMore ? loadMore.buttonLabel : '' }}"
    >
      <for each="p in posts">
        <li data-post-feed-item>
          <include
            src="../components/post-card.html"
            data='{"post": {{ p | json | raw }}, "headingLevel": "2", "showCover": true, "showExcerpt": true, "showTags": true}'
          ></include>
        </li>
      </for>
    </ul>
  </section>

  <include src="../components/pagination.html"></include>
</block>
