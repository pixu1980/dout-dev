<extends src="../layouts/base.html" />

<block name="head">
  <link
    rel="alternate"
    type="application/rss+xml"
    title="{{ site.title }} — {{ tag.name }}"
    href="/tags/{{ tag.slug }}.xml"
  />
  <if condition="canonicalUrl"><link rel="canonical" href="{{ canonicalUrl }}" /></if>
  <if condition="description"><meta name="description" content="{{ description }}" /></if>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Tag: {{ tag.name }}" />
  <if condition="description"><meta property="og:description" content="{{ description }}" /></if>
  <meta property="og:url" content="{{ canonicalUrl }}" />
  <meta name="twitter:card" content="summary" />
</block>

<block name="content">
  <section aria-labelledby="tag-title">
    <h1 id="tag-title">Tag: {{ tag.name }}</h1>
    <p><a href="/tags/{{ tag.slug }}.xml">RSS feed</a></p>
    <ul>
      <for each="p in posts">
        <li>
          <a href="/posts/{{ p.name }}.html">{{ p.title }}</a>
          <time datetime="{{ p.date | date:'YYYY-MM-DD' }}">{{ p.date | date:'long' }}</time>
        </li>
      </for>
    </ul>

    <include src="../components/pagination.html"></include>
  </section>
</block>
