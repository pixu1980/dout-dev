<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title | default:site.title }}</title>

    <!-- Minimal styling -->
    <style>
      body {
        font-family: system-ui, sans-serif;
        line-height: 1.6;
        max-width: 800px;
        margin: 0 auto;
        padding: 1rem;
      }
      .skip-link {
        position: absolute;
        top: -40px;
        left: 6px;
        background: #000;
        color: #fff;
        padding: 8px;
        text-decoration: none;
        z-index: 100;
      }
      .skip-link:focus {
        top: 6px;
      }
    </style>
  </head>
  <body>
    <!-- Skip link -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Main content -->
    <main id="main-content" tabindex="-1">
      <header>
        <h1><a href="/">{{ site.title }}</a></h1>
      </header>

      <block name="content">
        <!-- Content goes here -->
      </block>

      <footer>
        <p><small>&copy; {{ site.currentYear }} {{ site.author }}</small></p>
      </footer>
    </main>
  </body>
</html>
