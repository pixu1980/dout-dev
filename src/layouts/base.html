<!doctype html>
<html lang="{{ site.language | default:'en' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title | default: site.title }}</title>
    <meta name="theme-color" content="#ff6b3d" />
    <meta name="description" content="{{ description | default: site.description }}" />
    <meta name="author" content="{{ site.author | default:'Emiliano Pisu' }}" />
    <meta name="robots" content="{{ robots | default:'index,follow' }}" />
    <meta http-equiv="Content-Security-Policy" content="{{ site.security.csp }}" />
    <meta name="referrer" content="{{ site.security.referrerPolicy }}" />
    <meta name="dout:analytics-endpoint" content="{{ site.analytics.endpoint }}" />
    <meta name="dout:analytics-dashboard" content="{{ site.analytics.dashboardPath }}" />
    <link rel="canonical" href="{{ canonicalUrl | default: site.url }}" />
    <meta property="og:site_name" content="{{ site.title | default:'dout.dev' }}" />
    <meta property="og:locale" content="{{ site.locale | default:'en-US' }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="{{ site.title | default:'dout.dev' }}"
      href="{{ site.rssFeedPath | default:'/feed.rss' }}"
    />
    <link
      rel="alternate"
      type="application/feed+json"
      title="{{ site.title | default:'dout.dev' }} JSON Feed"
      href="{{ site.jsonFeedPath | default:'/feed.json' }}"
    />
    <script>
      document.documentElement.dataset.userPreferences = 'loading';
      if (location.protocol === 'file:') {
        document.documentElement.dataset.previewMode = 'file';
      }
    </script>
    <style>
      :root {
        --dout--file-preview-border: #d9a441;
        --dout--file-preview-bg: #fff3cd;
        --dout--file-preview-text: #5c3b00;
      }

      [data-file-preview-warning] {
        display: none;
        margin: 0;
        padding: 0.85rem 1rem;
        border-bottom: 1px solid var(--dout--file-preview-border);
        background: var(--dout--file-preview-bg);
        color: var(--dout--file-preview-text);
        font:
          600 0.95rem/1.4 'Avenir Next',
          'Segoe UI Variable Text',
          'Helvetica Neue',
          sans-serif;
      }

      html[data-preview-mode='file'] [data-file-preview-warning] {
        display: block;
      }

      [data-file-preview-warning] code {
        font:
          700 0.92em/1.2 'SFMono-Regular',
          'SF Mono',
          'Consolas',
          'Liberation Mono',
          monospace;
      }
    </style>
    <block name="head"></block>
    <link rel="stylesheet" href="/styles/index.css" />
    <script type="module" src="/scripts/user-preferences-bootstrap.js"></script>
  </head>
  <body data-site-shell>
    <p data-file-preview-warning role="alert">
      This page was opened from <code>file://</code>. Chromium blocks the local CSS and JS for this site in that mode.
      Preview it over HTTP with <code>pnpm dev</code> or <code>pnpm preview</code>.
    </p>
    <div data-preferences-skeleton aria-hidden="true" inert></div>
    <a data-skip-link href="#main">Skip to main content</a>
    <div id="page-announcer" data-visually-hidden aria-live="polite" aria-atomic="true"></div>
    <include src="../components/header.html" />

    <main data-site-main id="main" tabindex="-1" aria-label="Main content">
      <block name="content">Content</block>
    </main>

    <include src="../components/footer.html" />
    <script type="module" src="/scripts/main.js"></script>
  </body>
</html>
