      <stop offset="1" stop-color="#111111" />
    </linearGradient>
    <pattern id="dotGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect x="3" y="3" width="2" height="2" fill="#16120F" fill-opacity="0.16" />
    </pattern>
  </defs>
