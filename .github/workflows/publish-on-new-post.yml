name: Publish new post

on:
  push:
    paths:
      - 'data/posts/**.md'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (if any)
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Build site
        run: |
          # Run the cms build script which should output static files into ./public
          if [ -f ./cms/index.js ]; then node ./cms/index.js; fi
          # Ensure CNAME is copied to the published folder
          if [ -f CNAME ]; then mkdir -p public && cp CNAME public/CNAME; fi

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./public

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
