name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate Template Syntax
      run: |
        echo "🔍 Checking for forbidden Liquid/Jekyll syntax in templates..."
        LIQUID_FILES=$(grep -r "{%" src/ || true)
        if [ ! -z "$LIQUID_FILES" ]; then
          echo "❌ ERROR: Found forbidden Liquid/Jekyll syntax in templates:"
          echo "$LIQUID_FILES"
          echo ""
          echo "This project uses CUSTOM template engine syntax:"
          echo "  ❌ {% if %} → ✅ <if condition=\"...\">"
          echo "  ❌ {% for %} → ✅ <for each=\"... in ...\">"
          echo "  ❌ {% include %} → ✅ <include src=\"...\">"
          echo "  ❌ {% extends %} → ✅ <extends layout=\"...\">"
          echo ""
          echo "See COPILOT_RULES.md and docs/technical-specs.md for complete syntax reference."
          exit 1
        fi
        echo "✅ Template syntax validation passed!"

    - name: Run tests
      run: npm test

    - name: Lint code
      run: npm run lint

    - name: Build CMS
      run: npm run cms:build

    - name: Build site
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 7
